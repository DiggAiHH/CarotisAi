services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -fs localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - carotis-net

  hermes:
    build:
      context: ./hermes
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ../memory:/app/memory:rw
      - ../schemas:/app/schemas:ro
    environment:
      - HERMES_OLLAMA_URL=http://ollama:11434
      - HERMES_MODEL=nous-hermes-3-llama-3.1
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs localhost:8200/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - carotis-net

  backend:
    build:
      context: ./backend
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/data:rw
      - ../scripts/anonymize.py:/app/scripts/anonymize.py:ro
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - carotis-net

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    networks:
      - carotis-net

volumes:
  ollama-models:

networks:
  carotis-net:
    name: carotis-net
    internal: false
