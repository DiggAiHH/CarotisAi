<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" stroke="#3b82f6" stroke-width="4" opacity="0.3"/>
  <circle cx="100" cy="100" r="82" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Carotid artery stylized path -->
  <path d="M60 140 
           C 60 140, 55 120, 70 100
           C 80 85, 90 90, 100 80
           C 110 70, 115 75, 120 60
           C 125 45, 120 35, 130 30
           C 140 25, 145 35, 140 50
           C 135 65, 125 70, 115 85
           C 105 100, 95 95, 85 110
           C 75 125, 70 130, 60 140Z" 
        fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Branching vessel -->
  <path d="M100 80 C 110 75, 125 70, 135 75" 
        fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  
  <!-- AI node dots along the artery -->
  <circle cx="70" cy="100" r="4" fill="#10b981"/>
  <circle cx="100" cy="80" r="4" fill="#10b981"/>
  <circle cx="120" cy="60" r="4" fill="#10b981"/>
  <circle cx="130" cy="30" r="5" fill="#3b82f6"/>
  
  <!-- Neural network connection lines -->
  <line x1="70" y1="100" x2="100" y2="80" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="80" x2="120" y2="60" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="60" x2="130" y2="30" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
        font-size="14" font-weight="700" fill="#f1f5f9" letter-spacing="0.1em">CAROTIS-AI</text>
</svg>