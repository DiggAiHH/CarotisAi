<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0f172a" rx="12"/>
  <!-- Window chrome -->
  <rect x="0" y="0" width="800" height="32" fill="#1e293b" rx="12"/>
  <circle cx="20" cy="16" r="6" fill="#ef4444"/>
  <circle cx="40" cy="16" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="16" r="6" fill="#10b981"/>
  <text x="400" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Carotis-AI — Decision-Tree-Capture</text>
  
  <!-- Decision tree visualization -->
  <rect x="16" y="48" width="768" height="430" fill="#020617" rx="8"/>
  
  <!-- Tree nodes -->
  <rect x="360" y="70" width="80" height="36" fill="#3b82f6" opacity="0.2" rx="6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="92" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#3b82f6">Stenose > 50%?</text>
  
  <!-- Yes branch -->
  <line x1="400" y1="106" x2="280" y2="150" stroke="#475569" stroke-width="1.5"/>
  <text x="330" y="128" font-family="system-ui" font-size="10" fill="#10b981">Ja</text>
  <rect x="230" y="150" width="100" height="36" fill="#10b981" opacity="0.15" rx="6" stroke="#10b981" stroke-width="1.5"/>
  <text x="280" y="172" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#10b981">Symptomatisch?</text>
  
  <!-- No branch -->
  <line x1="400" y1="106" x2="520" y2="150" stroke="#475569" stroke-width="1.5"/>
  <text x="470" y="128" font-family="system-ui" font-size="10" fill="#ef4444">Nein</text>
  <rect x="470" y="150" width="100" height="36" fill="#ef4444" opacity="0.15" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="520" y="172" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#ef4444">Follow-up 12M</text>
  
  <!-- Second level -->
  <line x1="280" y1="186" x2="200" y2="230" stroke="#475569" stroke-width="1.5"/>
  <rect x="150" y="230" width="100" height="36" fill="#f59e0b" opacity="0.15" rx="6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="252" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#f59e0b">NASCET-Berechnung</text>
  
  <line x1="280" y1="186" x2="360" y2="230" stroke="#475569" stroke-width="1.5"/>
  <rect x="310" y="230" width="100" height="36" fill="#f59e0b" opacity="0.15" rx="6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="252" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#f59e0b">Plaque-Morphologie</text>
  
  <!-- Capture panel -->
  <rect x="16" y="290" width="768" height="170" fill="#1e293b" rx="8"/>
  <text x="32" y="314" font-family="system-ui" font-size="12" font-weight="600" fill="#f1f5f9">Begründung erfassen</text>
  <rect x="32" y="328" width="736" height="40" fill="#0f172a" rx="4" stroke="#334155" stroke-width="1"/>
  <text x="42" y="353" font-family="system-ui" font-size="12" fill="#94a3b8">„Stenose 72% NASCET, symptomatisch (TIA vor 4 Wochen), kalkifizierte Plaque..."</text>
  
  <rect x="32" y="380" width="140" height="32" fill="#3b82f6" rx="6"/>
  <text x="102" y="400" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#f1f5f9">Speichern (anonym)</text>
  
  <text x="190" y="400" font-family="system-ui" font-size="11" fill="#64748b">→ Wird Teil des Daily-Learning-Corpus</text>
  
  <!-- Screenshot label -->
  <rect x="16" y="448" width="240" height="30" fill="#020617" opacity="0.85" rx="4"/>
  <text x="26" y="468" font-family="system-ui" font-size="12" fill="#64748b">Screenshot: Decision-Tree-Harvesting</text>
</svg>