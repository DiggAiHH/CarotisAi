<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0f172a" rx="12"/>
  <!-- Window chrome -->
  <rect x="0" y="0" width="800" height="32" fill="#1e293b" rx="12"/>
  <circle cx="20" cy="16" r="6" fill="#ef4444"/>
  <circle cx="40" cy="16" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="16" r="6" fill="#10b981"/>
  <text x="400" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Carotis-AI — XAI-Erklärbarkeit</text>
  
  <!-- Left: Original + Heatmap overlay -->
  <rect x="16" y="48" width="380" height="430" fill="#020617" rx="8"/>
  <ellipse cx="206" cy="263" rx="130" ry="110" fill="#1e293b" opacity="0.5"/>
  <!-- Heatmap overlay -->
  <defs>
    <radialGradient id="heat1" cx="0.4" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
  <ellipse cx="206" cy="263" rx="110" ry="90" fill="url(#heat1)"/>
  <path d="M150 220 Q 190 200, 206 230 Q 222 260, 260 240" 
        fill="none" stroke="#f1f5f9" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Right: Explanation panel -->
  <rect x="412" y="48" width="372" height="430" fill="#1e293b" rx="8"/>
  <text x="426" y="72" font-family="system-ui" font-size="14" font-weight="600" fill="#f1f5f9">Erklärbarkeit</text>
  <line x1="426" y1="80" x2="772" y2="80" stroke="#334155" stroke-width="1"/>
  
  <text x="426" y="108" font-family="system-ui" font-size="12" font-weight="600" fill="#3b82f6">HiResCAM</text>
  <text x="426" y="128" font-family="system-ui" font-size="12" fill="#94a3b8">Pixelgenaue Attribution der Regions-</text>
  <text x="426" y="144" font-family="system-ui" font-size="12" fill="#94a3b8">entscheidung auf Basis des letzten</text>
  <text x="426" y="160" font-family="system-ui" font-size="12" fill="#94a3b8">Convolution-Layers.</text>
  
  <text x="426" y="195" font-family="system-ui" font-size="12" font-weight="600" fill="#10b981">Grad-CAM Fallback</text>
  <text x="426" y="215" font-family="system-ui" font-size="12" fill="#94a3b8">Globale Klassen-Aktivierung als</text>
  <text x="426" y="231" font-family="system-ui" font-size="12" fill="#94a3b8">Fallback bei niedriger Konfidenz.</text>
  
  <text x="426" y="270" font-family="system-ui" font-size="12" font-weight="600" fill="#f59e0b">Trust-Score</text>
  <rect x="426" y="280" width="200" height="8" fill="#334155" rx="4"/>
  <rect x="426" y="280" width="170" height="8" fill="#f59e0b" rx="4"/>
  <text x="636" y="288" font-family="system-ui" font-size="11" fill="#f59e0b">4.2 / 5.0</text>
  
  <!-- Screenshot label -->
  <rect x="16" y="448" width="200" height="30" fill="#020617" opacity="0.85" rx="4"/>
  <text x="26" y="468" font-family="system-ui" font-size="12" fill="#64748b">Screenshot: XAI-Heatmap + Erklärung</text>
</svg>