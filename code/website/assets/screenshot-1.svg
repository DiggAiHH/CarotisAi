<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0f172a" rx="12"/>
  <!-- Window chrome -->
  <rect x="0" y="0" width="800" height="32" fill="#1e293b" rx="12"/>
  <circle cx="20" cy="16" r="6" fill="#ef4444"/>
  <circle cx="40" cy="16" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="16" r="6" fill="#10b981"/>
  <text x="400" y="21" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Carotis-AI — DICOM-Viewer</text>
  
  <!-- DICOM image area -->
  <rect x="16" y="48" width="500" height="430" fill="#020617" rx="8"/>
  <!-- Stylized CT scan -->
  <ellipse cx="266" cy="263" rx="160" ry="140" fill="#1e293b" opacity="0.6"/>
  <ellipse cx="266" cy="263" rx="130" ry="110" fill="#334155" opacity="0.4"/>
  <ellipse cx="266" cy="263" rx="90" ry="75" fill="#475569" opacity="0.3"/>
  <!-- Carotid highlight -->
  <path d="M200 200 Q 240 180, 266 220 Q 292 260, 330 240" 
        fill="none" stroke="#3b82f6" stroke-width="6" opacity="0.8" stroke-linecap="round"/>
  <path d="M210 210 Q 245 195, 266 225 Q 286 255, 320 245" 
        fill="none" stroke="#10b981" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
  
  <!-- Sidebar -->
  <rect x="532" y="48" width="252" height="430" fill="#1e293b" rx="8"/>
  <text x="540" y="72" font-family="system-ui" font-size="14" font-weight="600" fill="#f1f5f9">AI-Ergebnisse</text>
  <line x1="540" y1="80" x2="776" y2="80" stroke="#334155" stroke-width="1"/>
  
  <text x="540" y="105" font-family="system-ui" font-size="12" fill="#94a3b8">Stenose-Grad</text>
  <text x="776" y="105" text-anchor="end" font-family="system-ui" font-size="16" font-weight="700" fill="#ef4444">72 %</text>
  
  <text x="540" y="135" font-family="system-ui" font-size="12" fill="#94a3b8">Konfidenz</text>
  <rect x="540" y="142" width="236" height="8" fill="#334155" rx="4"/>
  <rect x="540" y="142" width="196" height="8" fill="#f59e0b" rx="4"/>
  <text x="776" y="165" text-anchor="end" font-family="system-ui" font-size="12" fill="#f59e0b">0.87</text>
  
  <text x="540" y="195" font-family="system-ui" font-size="12" fill="#94a3b8">Plaque-Typ</text>
  <text x="776" y="195" text-anchor="end" font-family="system-ui" font-size="12" font-weight="600" fill="#f1f5f9">kalkifiziert</text>
  
  <!-- Heatmap toggle -->
  <rect x="540" y="220" width="236" height="32" fill="#3b82f6" opacity="0.2" rx="6"/>
  <text x="658" y="241" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="600" fill="#3b82f6">HiResCAM-Heatmap aktiv</text>
  
  <!-- Screenshot label -->
  <rect x="16" y="448" width="180" height="30" fill="#020617" opacity="0.85" rx="4"/>
  <text x="26" y="468" font-family="system-ui" font-size="12" fill="#64748b">Screenshot: DICOM-Viewer</text>
</svg>