name: Local Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"  # Mondays at 05:00 UTC

jobs:
  ollama-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull Ollama image
        run: docker pull ollama/ollama:latest
      - name: Start Ollama
        run: |
          docker run -d --name ollama -p 11434:11434 ollama/ollama:latest
          sleep 5
      - name: Pull models
        run: |
          curl -fs http://localhost:11434/api/tags >/dev/null || exit 1
          docker exec ollama ollama pull qwen2.5-coder:7b

  hermes-smoke:
    runs-on: ubuntu-latest
    needs: ollama-setup
    steps:
      - uses: actions/checkout@v4
      - name: Build Hermes
        run: docker compose build hermes
      - name: Start Hermes
        run: docker compose up -d hermes
      - name: Ping Hermes
        run: |
          for i in {1..30}; do
            curl -fs http://localhost:8200/health && exit 0
            sleep 2
          done
          exit 1
        timeout-minutes: 5
      - name: Simple prompt test
        run: |
          curl -fs -X POST http://localhost:8200/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"qwen2.5-coder:7b","messages":[{"role":"user","content":"Say OK"}]}' \
            | grep -q "OK"
        timeout-minutes: 5

      - name: Browser harness config check
        run: |
          docker compose exec -T hermes cat /app/config.toml | grep -A 10 '\[browser\]'
        timeout-minutes: 1

      - name: Run hermes healthcheck script
        run: |
          pip install requests toml
          python scripts/hermes_healthcheck.py --format json
        timeout-minutes: 2

      - name: Cleanup
        run: docker compose down
