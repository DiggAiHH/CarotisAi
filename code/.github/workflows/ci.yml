name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff black
      - run: ruff check backend/app ml
      - run: black --check backend/app ml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run typecheck

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - run: pip install pytest pytest-asyncio httpx pytest-cov
      - run: PYTHONPATH=backend pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=75
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ml/requirements.txt
      - run: pip install pytest pytest-cov
      - run: PYTHONPATH=backend:ml pytest ml/ -v --cov=ml --cov-report=xml --cov-fail-under=60

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run typecheck
      - run: cd frontend && npm run lint
      - run: cd frontend && npm test -- --run

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r backend/app -ll
      - run: |
          if grep -r "openai\|anthropic" backend/app/services/inference*; then
            echo "ERROR: Cloud API references found in inference path"
            exit 1
          fi
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm audit --audit-level=moderate

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp backend/.env.example backend/.env
      - run: docker compose build
      - run: docker compose up -d
      - run: sleep 10 && curl -fs http://localhost:8000/health
      - run: docker compose down
