# Carotis-AI — Production-Demo Compose Override
# Usage:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.demo.yml up -d --build
#
# Services:
#   backend  — FastAPI (port 8000 internal)
#   frontend — Static nginx (port 80 internal)
#   caddy    — Reverse proxy + TLS (ports 80/443)
#   ollama   — Local LLM (optional, port 11434 internal)
#   hermes   — Agent wrapper (optional, port 8200 internal)

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - API_KEY=${API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///data/carotis.db
      - DEMO_MODE=true
      - DEBUG=false
    volumes:
      - backend_data:/data
      - ../scripts:/app/scripts:ro
      - ../schemas:/app/schemas:ro
      - ../memory:/app/memory:ro
    networks:
      - carotis-demo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - carotis-demo
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - carotis-demo
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - carotis-demo
    restart: unless-stopped
    profiles:
      - ollama

  hermes:
    build:
      context: ../hermes
      dockerfile: Dockerfile
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - carotis-demo
    depends_on:
      - ollama
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  backend_data:
  caddy_data:
  caddy_config:
  ollama_data:

networks:
  carotis-demo:
    driver: bridge
