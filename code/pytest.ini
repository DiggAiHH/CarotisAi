[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    error
    ignore::DeprecationWarning:passlib
    ignore::DeprecationWarning:pydicom
testpaths = tests ml
pythonpath = backend
addopts = --strict-markers -ra
markers =
    ml: Mark a test as requiring ML dependencies (torch, mlflow, monai).
