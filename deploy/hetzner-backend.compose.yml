services:
  carotis-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.carotis.diggai.de
        VITE_API_KEY: ${API_KEY:?set API_KEY}
    image: carotis-ai-frontend-hetzner:latest
    restart: unless-stopped
    expose:
      - "80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  carotis-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: carotis-ai-backend:latest
    restart: unless-stopped
    environment:
      API_KEY: ${API_KEY:?set API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY}
      ANONYMIZATION_SALT: ${ANONYMIZATION_SALT:?set ANONYMIZATION_SALT}
      PROJECT_ROOT: /app
      DATABASE_URL: sqlite+aiosqlite:////data/db/carotis_backend.db
      ONNX_MODEL_PATH: /data/models/mfsd_unet.onnx
      CORS_ORIGINS: https://carotis.diggai.de,https://app.carotis.diggai.de
      DEBUG: "false"
    volumes:
      - ../data:/data
      - ../scripts:/app/scripts:ro
      - ../schemas:/app/schemas:ro
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: carotis-ai-caddy:latest
    restart: unless-stopped
    depends_on:
      - carotis-frontend
      - carotis-backend
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://127.0.0.1:2019/config/ -O /tmp/caddy-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./Caddyfile.backend:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  caddy_data:
  caddy_config:
