app = "carotis-ai-frontend"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.frontend-fly"
  [build.args]
    VITE_API_URL = "https://api.carotis.diggai.de"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 80
    soft_limit = 40

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
