name: Deploy backend to Hetzner

on:
  push:
    branches: [master]
    paths:
      - "code/backend/**"
      - "code/data/models/**"
      - "deploy/hetzner-backend.compose.yml"
      - "deploy/Caddyfile.backend"
      - "deploy/Dockerfile.caddy"
      - ".github/workflows/deploy-backend-hetzner.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: hetzner-backend
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Install runner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync
      - name: Generate demo ONNX model
        run: |
          python3 -m pip install "numpy>=1.26" "onnx>=1.14.0" --quiet
          python3 code/scripts/generate_demo_model.py
      - name: Write SSH key
        run: |
          install -m 700 -d ~/.ssh
          python3 -c "import sys; sys.stdout.buffer.write(sys.stdin.buffer.read())" <<< "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/hetzner_carotis
          chmod 600 ~/.ssh/hetzner_carotis
          ssh-keyscan -H "${{ secrets.HETZNER_SERVER_IP }}" >> ~/.ssh/known_hosts
      - name: Validate SSH key
        run: ssh-keygen -y -f ~/.ssh/hetzner_carotis
      - name: Prepare Hetzner host
        run: |
          ssh -i ~/.ssh/hetzner_carotis "${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SERVER_IP }}" "bash -se" <<'EOF'
          set -euo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y docker.io docker-compose-plugin rsync curl
            systemctl enable --now docker
          else
            apt-get update
            apt-get install -y docker-compose-plugin rsync curl
          fi
          mkdir -p /opt/carotis-ai/backend /opt/carotis-ai/deploy /opt/carotis-ai/scripts /opt/carotis-ai/schemas /opt/carotis-ai/data/db /opt/carotis-ai/data/models
          chown -R 1000:1000 /opt/carotis-ai/data
          EOF
      - name: Sync deployment files
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hetzner_carotis" \
            code/backend/ \
            "${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SERVER_IP }}:/opt/carotis-ai/backend/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hetzner_carotis" \
            deploy/ \
            "${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SERVER_IP }}:/opt/carotis-ai/deploy/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hetzner_carotis" \
            scripts/ \
            "${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SERVER_IP }}:/opt/carotis-ai/scripts/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hetzner_carotis" \
            schemas/ \
            "${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SERVER_IP }}:/opt/carotis-ai/schemas/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hetzner_carotis" \
            code/data/models/ \
            "${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SERVER_IP }}:/opt/carotis-ai/data/models/"
      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/hetzner_carotis "${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SERVER_IP }}" "bash -se" <<'EOF'
          set -euo pipefail
          cd /opt/carotis-ai/deploy
          cat > .env <<ENV
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          API_KEY=${{ secrets.API_KEY }}
          ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
          ANONYMIZATION_SALT=${{ secrets.ANONYMIZATION_SALT }}
          ENV
          docker compose -f hetzner-backend.compose.yml --env-file .env up -d --build
          docker compose -f hetzner-backend.compose.yml ps
          sleep 10
          curl -sf http://localhost:8000/health/ || (echo "Health check failed" && exit 1)
          EOF
